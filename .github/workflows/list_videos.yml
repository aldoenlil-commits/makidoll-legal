name: List Cloudinary videos

on:
  workflow_dispatch:
  push:
    branches:
      - claude/cloudinary-sdk-onboarding-nfsrpk
    paths:
      - .github/workflows/list_videos.yml

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Installer le SDK Cloudinary
        run: pip install cloudinary

      - name: Chercher l'asset par son nom (tous types)
        env:
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          python - <<'PY'
          import os, cloudinary
          from cloudinary import Search
          cloudinary.config(
              cloud_name="dhxklbcx",
              api_key="598232418875687",
              api_secret=os.environ["CLOUDINARY_API_SECRET"],
              secure=True,
          )
          for q in ["1F0EB613", "7A1FD781", "iuldwd", "qufcfu"]:
              print("### recherche:", q)
              try:
                  r = Search().expression(q).max_results(10).execute()
                  print("total_count:", r.get("total_count"))
                  for a in r.get("resources", []):
                      print(" -", a.get("resource_type"), "/", a.get("type"),
                            "| public_id:", a.get("public_id"),
                            "| format:", a.get("format"))
                      print("   secure_url:", a.get("secure_url"))
              except Exception as e:
                  print("ERREUR:", e)
              print("---")
          PY
