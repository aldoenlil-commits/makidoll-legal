name: Cloudinary onboarding

# Lancement manuel depuis l'onglet "Actions" (bouton "Run workflow").
on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Installer le SDK Cloudinary
        run: pip install cloudinary

      - name: Exécuter le script d'onboarding
        # Le secret est injecté depuis les "Secrets" du dépôt (chiffré),
        # jamais écrit dans le code. GitHub le masque dans les logs.
        env:
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python cloudinary_onboarding.py
